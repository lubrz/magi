services:
  # --- Knowledge Graph ---
  neo4j:
    image: neo4j:5-community
    container_name: triad-neo4j
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-triad2026}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-triad2026}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend ---
  backend:
    build: ./backend
    container_name: triad-backend
    ports:
      - "8080:8080"
    environment:
      NEO4J_MODE: ${NEO4J_MODE:-local}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-triad2026}
      # Agent providers passed via shell env
      AXIOM_PROVIDER: ${AXIOM_PROVIDER:-openai}
      AXIOM_MODEL: ${AXIOM_MODEL:-gpt-4o}
      AXIOM_API_KEY: ${AXIOM_API_KEY}
      PRISM_PROVIDER: ${PRISM_PROVIDER:-anthropic}
      PRISM_MODEL: ${PRISM_MODEL:-claude-3-5-sonnet-20240620}
      PRISM_API_KEY: ${PRISM_API_KEY}
      FORGE_PROVIDER: ${FORGE_PROVIDER:-google}
      FORGE_MODEL: ${FORGE_MODEL:-gemini-1.5-flash}
      FORGE_API_KEY: ${FORGE_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # --- Frontend ---
  frontend:
    build: ./frontend
    container_name: triad-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:

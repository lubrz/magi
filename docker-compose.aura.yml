services:
  # Disable local Neo4j
  neo4j:
    profiles: ["disabled"]
  
  backend:
    # Clear the detailed depends_on from main file
    depends_on: {}
    environment:
      NEO4J_MODE: aura
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

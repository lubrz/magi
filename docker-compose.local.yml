services:
  # Local LLM Runner
  ollama:
    image: ollama/ollama:latest
    container_name: triad-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    environment:
      AXIOM_PROVIDER: ollama
      AXIOM_MODEL: ${AXIOM_MODEL:-llama3.2}
      PRISM_PROVIDER: ollama
      PRISM_MODEL: ${PRISM_MODEL:-llama3.2}
      FORGE_PROVIDER: ollama
      FORGE_MODEL: ${FORGE_MODEL:-llama3.2}
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:

services:
  # Local LLM Runner
  ollama:
    image: ollama/ollama:latest
    container_name: triad-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Setup service to pull the model automatically
  ollama-setup:
    image: curlimages/curl:latest
    container_name: triad-ollama-setup
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}' && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'" ]

  backend:
    environment:
      AXIOM_PROVIDER: ollama
      AXIOM_MODEL: ${AXIOM_MODEL:-llama3.2}
      PRISM_PROVIDER: ollama
      PRISM_MODEL: ${PRISM_MODEL:-llama3.2}
      FORGE_PROVIDER: ollama
      FORGE_MODEL: ${FORGE_MODEL:-llama3.2}
      OLLAMA_URL: http://ollama:11434
      # Local embeddings via Ollama
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
      ollama:
        condition: service_started

volumes:
  ollama_data:
